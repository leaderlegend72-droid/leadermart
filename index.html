<!DOCTYPE html>
<html>
<head>
  <title>LeaderMart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family: Arial; background:#f1f3f6; }

    header {
      background:#2874f0;
      display:flex;
      align-items:center;
      padding:10px;
      color:white;
    }

    .logo {
      font-weight:bold;
      font-size:20px;
      margin-right:10px;
    }

    .search input {
      width:100%;
      padding:8px;
      border:none;
      border-radius:4px;
    }

    .search { flex:1; }

    .banner {
      margin:10px;
      background:#ff9f00;
      padding:15px;
      border-radius:8px;
      text-align:center;
      color:white;
      font-weight:bold;
    }

    .categories {
      display:flex;
      justify-content:space-around;
      background:white;
      padding:10px;
    }

    .cat {
      font-size:12px;
      text-align:center;
    }

    .section {
      padding:10px;
    }

    .products {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }

    .card {
      background:white;
      padding:10px;
      border-radius:10px;
      box-shadow:0 1px 5px rgba(0,0,0,0.1);
    }

    .card img { width:100%; }

    .price { color:#388e3c; font-weight:bold; }

    button {
      width:100%;
      padding:8px;
      background:#fb641b;
      border:none;
      color:white;
      border-radius:5px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">LeaderMart</div>
  <div class="search">
    <input type="text" placeholder="Search for products, brands and more">
  </div>
</header>

<div class="categories">
  <div class="cat">Mobiles</div>
  <div class="cat">Fashion</div>
  <div class="cat">Electronics</div>
  <div class="cat">Home</div>
</div>

<div class="banner">
🔥 Big Billion Style Deals
</div>

<div class="section">
  <h3>Best of Electronics</h3>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/150">
      <p>Smartphone</p>
      <p class="price">₹9,999</p>
      <a href="https://www.amazon.in" target="_blank">
        <button>Buy Now</button>
      </a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/150">
      <p>Headphones</p>
      <p class="price">₹1,299</p>
      <a href="https://www.flipkart.com" target="_blank">
        <button>Buy Now</button>
      </a>
    </div>

  </div>
</div>

</body>
</html>
