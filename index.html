<!DOCTYPE html>
<html>
<head>
  <title>LeaderMart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }
    header {
      background: #0d6efd;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }
    .search {
      padding: 10px;
      text-align: center;
      background: white;
    }
    input {
      width: 90%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
    }
    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      border-radius: 10px;
    }
    .price {
      color: green;
      font-weight: bold;
    }
    button {
      background: #0d6efd;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 6px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>LeaderMart 🛒</header>

<div class="search">
  <input type="text" placeholder="Search products...">
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Rice 5kg</h3>
    <p class="price">₹250</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Milk 1L</h3>
    <p class="price">₹60</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Oil 1L</h3>
    <p class="price">₹140</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Biscuits</h3>
    <p class="price">₹30</p>
    <button>Add to Cart</button>
  </div>

</div>

</body>
</html>
