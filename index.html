<!DOCTYPE html>
<html>
<head>
  <title>LeaderMart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background:#f1f3f6;
    }

    header {
      background:#2874f0;
      color:white;
      padding:15px;
      font-size:22px;
      text-align:center;
      font-weight:bold;
    }

    .search {
      background:white;
      padding:10px;
    }

    .search input {
      width:100%;
      padding:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    .banner {
      margin:10px;
      border-radius:12px;
      padding:20px;
      color:white;
      font-size:18px;
      font-weight:bold;
      background:linear-gradient(45deg,#ff416c,#ff4b2b);
    }

    .categories {
      display:flex;
      overflow-x:auto;
      gap:10px;
      padding:10px;
    }

    .cat {
      min-width:80px;
      text-align:center;
      background:white;
      padding:10px;
      border-radius:10px;
      font-size:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .section-title {
      padding:10px;
      font-weight:bold;
      font-size:18px;
    }

    .products {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      background:white;
      border-radius:12px;
      padding:10px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width:100%;
      border-radius:10px;
    }

    .price {
      color:#388e3c;
      font-weight:bold;
    }

    .badge {
      background:red;
      color:white;
      padding:3px 6px;
      font-size:10px;
      border-radius:6px;
      display:inline-block;
      margin-bottom:5px;
    }

    button {
      width:100%;
      margin-top:5px;
      padding:8px;
      border:none;
      border-radius:8px;
      background:#ff9f00;
      color:white;
      font-weight:bold;
    }
  </style>
</head>

<body>

<header>🛒 LeaderMart</header>

<div class="search">
  <input type="text" placeholder="Search for products...">
</div>

<div class="banner">
🔥 Big Sale! Up to 70% OFF 🎉
</div>

<div class="categories">
  <div class="cat">Mobiles</div>
  <div class="cat">Fashion</div>
  <div class="cat">Electronics</div>
  <div class="cat">Shoes</div>
  <div class="cat">Grocery</div>
</div>

<div class="section-title">🔥 Trending</div>

<div class="products">

  <div class="card">
    <span class="badge">HOT</span>
    <img src="https://via.placeholder.com/150">
    <p>Smartphone 5G</p>
    <p class="price">₹9,999</p>
    <a href="https://www.amazon.in" target="_blank">
      <button>Buy Now</button>
    </a>
  </div>

  <div class="card">
    <span class="badge">SALE</span>
    <img src="https://via.placeholder.com/150">
    <p>Wireless Earbuds</p>
    <p class="price">₹999</p>
    <a href="https://www.flipkart.com" target="_blank">
      <button>Buy Now</button>
    </a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Shoes</p>
    <p class="price">₹799</p>
    <a href="https://www.flipkart.com" target="_blank">
      <button>Buy Now</button>
    </a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <p>Smart Watch</p>
    <p class="price">₹1,499</p>
    <a href="https://www.amazon.in" target="_blank">
      <button>Buy Now</button>
    </a>
  </div>

</div>

</body>
</html>
