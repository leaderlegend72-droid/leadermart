<!DOCTYPE html>
<html>
<head>
  <title>LeaderMart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; font-family:Arial; background:#f5f5f5; }
    header { background:#0d6efd; color:white; padding:15px; text-align:center; font-size:24px; }
    .products { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:10px; }
    .card { background:white; padding:10px; border-radius:10px; text-align:center; }
    img { width:100%; border-radius:10px; }
    .price { color:green; font-weight:bold; }
    button { background:#28a745; color:white; border:none; padding:8px; border-radius:6px; }
  </style>
</head>

<body>

<header>LeaderMart Affiliate 🛒</header>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Smartphone</h3>
    <p class="price">₹9999</p>
    <a href="https://www.amazon.in" target="_blank">
      <button>Buy on Amazon</button>
    </a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <h3>Shoes</h3>
    <p class="price">₹799</p>
    <a href="https://www.flipkart.com" target="_blank">
      <button>Buy on Flipkart</button>
    </a>
  </div>

</div>

</body>
</html>
